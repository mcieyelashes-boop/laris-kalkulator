name: Update notifikasi fee (otomatis)

# Jalan otomatis tiap hari + bisa dipicu manual dari tab Actions
on:
  schedule:
    - cron: '0 22 * * *'   # tiap hari 22:00 UTC (~05:00 WIB)
  workflow_dispatch:

permissions:
  contents: write           # biar robot boleh commit config.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jalankan robot update fee
        run: node scripts/update-fees.js

      - name: Commit kalau ada perubahan
        run: |
          git config user.name "laris-fee-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan — skip commit."
          else
            git commit -m "auto: update notifikasi fee marketplace"
            git push
          fi
